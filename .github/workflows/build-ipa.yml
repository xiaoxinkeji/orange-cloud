name: Build Unsigned IPA

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.5.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_15.app/Contents/Developer || \
          sudo xcode-select -s "$(ls -d /Applications/Xcode_1*.app | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: xcode-${{ runner.os }}-${{ hashFiles('apps/ios/Orange Cloud/Orange Cloud.xcodeproj/project.pbxproj') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: Set version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          echo "tag=$RAW" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          V=$(echo "$RAW" | sed 's/^v//')
          echo "number=$V" >> $GITHUB_OUTPUT
          echo "build=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Set marketing version from tag
        working-directory: apps/ios/Orange Cloud
        run: |
          python3 -c "
          import re
          v = '${{ steps.version.outputs.number }}'
          with open('Orange Cloud.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          content = re.sub(r'MARKETING_VERSION = [0-9.]+;', f'MARKETING_VERSION = {v};', content)
          with open('Orange Cloud.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print(f'Set MARKETING_VERSION = {v}')
          "

      - name: Disable code signing
        working-directory: apps/ios/Orange Cloud
        run: |
          python3 << 'PYEOF'
          with open("Orange Cloud.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          # Only add CODE_SIGN_IDENTITY if not already present
          if 'CODE_SIGN_IDENTITY' not in content:
              content = content.replace(
                  'CODE_SIGN_STYLE = Manual;',
                  'CODE_SIGN_STYLE = Manual;\n\t\t\t\tCODE_SIGN_IDENTITY = "-";'
              )
          with open("Orange Cloud.xcodeproj/project.pbxproj", "w") as f:
              f.write(content)
          print("✅ Disabled code signing")
          PYEOF

      - name: Build archive
        working-directory: apps/ios/Orange Cloud
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project "Orange Cloud.xcodeproj" \
            -scheme "Orange Cloud" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/OrangeCloud.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="OPENSOURCE_UNLOCKED" \
            | tee build.log

          tail -20 build.log
          echo "✅ Archive completed"

      - name: Create unsigned IPA
        id: ipa
        run: |
          set -eo pipefail
          ARCHIVE="$RUNNER_TEMP/OrangeCloud.xcarchive"
          PAYLOAD="$RUNNER_TEMP/Payload"
          IPA_PATH="$RUNNER_TEMP/OrangeCloud-${{ steps.version.outputs.tag }}-unsigned.ipa"

          mkdir -p "$PAYLOAD"
          cp -R "$ARCHIVE/Products/Applications/Orange Cloud.app" "$PAYLOAD/"

          # Strip widget extension for import compatibility test
          rm -rf "$PAYLOAD/Orange Cloud.app/PlugIns" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/Metadata.appintents" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/"*.lproj/nlu.appintents || true
          echo "Stripped PlugIns and AppIntents metadata"

          # Strip ad-hoc code signature for import tool compatibility
          rm -rf "$PAYLOAD/Orange Cloud.app/_CodeSignature" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/CodeResources" || true
          rm -f "$PAYLOAD/Orange Cloud.app/embedded.mobileprovision" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/SC_Info" || true
          echo "Stripped ad-hoc code signature and provisioning data"

          cd "$RUNNER_TEMP"
          ditto -c -k --keepParent Payload "$IPA_PATH"

          # Verify IPA with comprehensive check (ZIP structure + Payload + Info.plist + contamination)
          python3 "$GITHUB_WORKSPACE/scripts/verify-ipa.py" --ci "$IPA_PATH"
          ls -lh "$IPA_PATH"

          # Generate SHA256 for user download verification
          CKSUM=$(shasum -a 256 "$IPA_PATH" | awk '{print $1}')
          echo "checksum=$CKSUM" >> $GITHUB_OUTPUT
          echo "IPA created and verified | SHA256: $CKSUM"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: OrangeCloud-unsigned-ipa
          path: ${{ runner.temp }}/OrangeCloud-${{ steps.version.outputs.tag }}-unsigned.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Orange Cloud ${{ steps.version.outputs.tag }}
          body: |
            ## Orange Cloud ${{ steps.version.outputs.tag }}

            未签名 IPA — 需要自行使用签名工具签名后安装。

            ### 下载校验
            SHA256: `${{ steps.ipa.outputs.checksum }}`

            下载后请验证文件完整性。若无法导入，请确认哈希值匹配：
            ```
            shasum -a 256 OrangeCloud-*.ipa
            ```

            ### 签名方式
            - **AltStore / SideStore** — 使用 Apple ID 免费签名（7 天有效期）
            - **TrollStore** — 永久免签安装（需设备支持）
            - **企业签名 / 开发者签名** — 自行配置

            ### 编译信息
            - 全功能解锁（默认 Pro，无会员机制）
            - 基于 `${{ steps.version.outputs.sha }}` 构建
            - 版本号 `${{ steps.version.outputs.number }}` (build `${{ steps.version.outputs.build }}`)
            - Xcode 26 / iOS 26 SDK
          files: ${{ runner.temp }}/OrangeCloud-${{ steps.version.outputs.tag }}-unsigned.ipa
          draft: false
          prerelease: false

      - name: Verify release asset download
        run: |
          DL_URL="https://github.com/xiaoxinkeji/orange-cloud/releases/download/${{ steps.version.outputs.tag }}/OrangeCloud-${{ steps.version.outputs.tag }}-unsigned.ipa"
          echo "Downloading $DL_URL"
          # GitHub CDN 传播可能需要几秒，用重试代替硬编码 sleep
          for i in $(seq 1 10); do
            if curl -sfL -o /tmp/verify.ipa "$DL_URL"; then
              break
            fi
            echo "Attempt $i/10: waiting for release asset to propagate..."
            sleep 2
          done
          echo "Verifying..."
          python3 "$GITHUB_WORKSPACE/scripts/verify-ipa.py" --ci /tmp/verify.ipa
          EXPECTED="${{ steps.ipa.outputs.checksum }}"
          ACTUAL=$(shasum -a 256 /tmp/verify.ipa | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "CHECKSUM MISMATCH!"
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            exit 1
          fi
          echo "Asset verified: checksum match, zip valid"
