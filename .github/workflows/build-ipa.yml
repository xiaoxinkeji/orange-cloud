name: Build Unsigned IPA

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.8.2)"
        required: true
        default: "v1.8.2"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer || \
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | head -1)/Contents/Developer"
          xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: xcode-${{ runner.os }}-${{ hashFiles('apps/ios/Orange Cloud/Orange Cloud.xcodeproj/project.pbxproj') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: Set version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          echo "tag=$RAW" >> $GITHUB_OUTPUT
          V=$(echo "$RAW" | sed 's/^v//')
          echo "number=$V" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set marketing version
        working-directory: apps/ios/Orange Cloud
        run: |
          python3 -c "
          import re
          v = '${{ steps.version.outputs.number }}'
          with open('Orange Cloud.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          content = re.sub(r'MARKETING_VERSION = [0-9.]+;', f'MARKETING_VERSION = {v};', content)
          with open('Orange Cloud.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print(f'Set MARKETING_VERSION = {v}')
          "

      - name: Build archive
        working-directory: apps/ios/Orange Cloud
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project "Orange Cloud.xcodeproj" \
            -scheme "Orange Cloud" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/OrangeCloud.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="OPENSOURCE_UNLOCKED" \
            | tee build.log
          tail -20 build.log

      - name: Create unsigned IPA
        id: ipa
        run: |
          set -eo pipefail
          ARCHIVE="$RUNNER_TEMP/OrangeCloud.xcarchive"
          PAYLOAD="$RUNNER_TEMP/Payload"
          IPA_PATH="$RUNNER_TEMP/OrangeCloud-${{ steps.version.outputs.tag }}-unsigned.ipa"

          mkdir -p "$PAYLOAD"
          cp -R "$ARCHIVE/Products/Applications/Orange Cloud.app" "$PAYLOAD/"

          # Strip extensions and signing artifacts for clean unsigned IPA
          rm -rf "$PAYLOAD/Orange Cloud.app/PlugIns" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/_CodeSignature" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/CodeResources" || true
          rm -f "$PAYLOAD/Orange Cloud.app/embedded.mobileprovision" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/SC_Info" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/Metadata.appintents" || true
          rm -rf "$PAYLOAD/Orange Cloud.app/"*.lproj/nlu.appintents || true

          cd "$RUNNER_TEMP"
          ditto -c -k --keepParent Payload "$IPA_PATH"

          python3 "$GITHUB_WORKSPACE/scripts/verify-ipa.py" --ci "$IPA_PATH"
          ls -lh "$IPA_PATH"

          CKSUM=$(shasum -a 256 "$IPA_PATH" | awk '{print $1}')
          echo "checksum=$CKSUM" >> $GITHUB_OUTPUT
          echo "SHA256: $CKSUM"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: OrangeCloud-unsigned-ipa
          path: ${{ runner.temp }}/OrangeCloud-${{ steps.version.outputs.tag }}-unsigned.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Orange Cloud ${{ steps.version.outputs.tag }} (开源免费版)
          body: |
            ## Orange Cloud ${{ steps.version.outputs.tag }} — 开源免费版

            基于 [chen2he/orange-cloud](https://github.com/chen2he/orange-cloud) 上游代码构建，所有 Pro 功能已解锁，完全免费使用。

            ### 与 App Store 版本的区别

            - **Pro 功能全部免费** — 多账号、存储 (R2/D1/KV)、Workers 实时日志、WAF、Tunnel、Snippets、7 天/30 天分析等全部解锁，无需内购
            - **未签名** — 需要自行使用签名工具签名后安装
            - **不包含 Widget / Watch / Siri 扩展** — 这些扩展从 IPA 中移除以简化侧载

            ### 功能亮点

            - **OAuth 2.0 + PKCE 登录** — 按 scope 细粒度授权，一键重授权，支持多账号
            - **域名管理** — DNS 记录 CRUD、缓存规则、负载均衡、Bulk Redirects、流量分析图表
            - **开发者平台** — Workers & Pages 聚合管理，实时日志流 (WebSocket)，资源创建与部署
            - **存储** — R2 对象存储，D1 SQL 控制台，KV 键值管理
            - **安全** — WAF 自定义规则编辑器，SSL/Transform Rules/IP 访问规则
            - **Zero Trust** — Tunnel 状态，Access 应用，Gateway 策略
            - **设备端 AI** — 本地 AI 能力
            - **13 语言本地化**
            - **iOS 17+** 支持

            ### 下载校验

            SHA256: `${{ steps.ipa.outputs.checksum }}`

            ```
            shasum -a 256 OrangeCloud-*.ipa
            ```

            ### 安装方式

            - **AltStore / SideStore** — Apple ID 免费签名（7 天有效期）
            - **TrollStore** — 永久免签（需设备支持）
            - **企业签名 / 开发者签名** — 自行配置

            ### 编译信息

            - 开源构建标志 `OPENSOURCE_UNLOCKED` — 全功能解锁
            - 基于上游 `${{ steps.version.outputs.sha }}` 构建
            - Xcode 26
            - 许可: AGPL-3.0 + Commons Clause

            ### 上游项目

            本项目代码来自 [chen2he/orange-cloud](https://github.com/chen2he/orange-cloud)，遵循 AGPL-3.0 + Commons Clause 许可。
          files: ${{ runner.temp }}/OrangeCloud-${{ steps.version.outputs.tag }}-unsigned.ipa
          draft: false
          prerelease: false
