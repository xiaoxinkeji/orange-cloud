name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  web-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm turbo lint

      - name: Build
        run: pnpm turbo build

  ios-build-check:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer || \
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | head -1)/Contents/Developer"
          xcodebuild -version

      - name: Build
        working-directory: apps/ios/Orange Cloud
        run: |
          xcodebuild build \
            -project "Orange Cloud.xcodeproj" \
            -scheme "Orange Cloud" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
