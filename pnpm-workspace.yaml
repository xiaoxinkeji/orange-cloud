packages:
  - 'apps/web'
  - 'packages/*'
# 安全补丁：把存在 Dependabot 漏洞的间接依赖强制抬到补丁版（按漏洞范围精准命中，不跨大版本）
overrides:
  'undici@>=7.0.0 <7.28.0': '7.28.0'
  'form-data@>=4.0.0 <4.0.6': '4.0.6'
  'ws@>=8.0.0 <8.21.0': '8.21.0'
  'postcss@<8.5.10': '8.5.10'
  'esbuild@>=0.27.3 <0.28.1': '0.28.1'
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true
